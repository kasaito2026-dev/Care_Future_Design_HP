<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ページが見つかりません | 一般社団法人 介護の現場からよりより社会を考える会</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #123456;
            --color-accent: #e67e22;
        }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .error-container {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
            border-top: 5px solid var(--color-primary);
        }
        .error-code {
            font-family: 'Montserrat', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            color: var(--color-primary);
            margin: 0;
            line-height: 1;
        }
        h1 {
            font-size: 1.5rem;
            margin-top: 1rem;
            color: #2c3e50;
        }
        p {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background-color: var(--color-accent);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 500;
            transition: background 0.3s ease;
        }
        .btn:hover {
            background-color: #d35400;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1>ページが見つかりません</h1>
        <p>お探しのページは削除されたか、名前が変更されたか、一時的に利用できない可能性があります。</p>
        <a href="/" class="btn">トップページへ戻る</a>
    </div>
</body>
</html>
